name: openclaw-mission-control

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      # Build from repo root so the backend image can include repo-level assets
      # like `backend/templates/`.
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Override localhost defaults for container networking
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      RQ_REDIS_URL: redis://redis:6379/0
      # Cloudflare Access (required when AUTH_MODE=cf_access)
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      CF_ACCESS_AUDIENCE: ${CF_ACCESS_AUDIENCE:-}
      CF_ACCESS_ALLOWED_EMAILS: ${CF_ACCESS_ALLOWED_EMAILS:-}
      # Worker token (required when AUTH_MODE=cf_access) for cockpit_bridge
      # calling /think-loop/decisions/{id}/start and /complete.
      COCKPIT_WORKER_TOKEN: ${COCKPIT_WORKER_TOKEN:-}
      # Caio read-only bridges (events.sqlite, critiques.sqlite, ...)
      # CAIO_STATE_HOST_DIR points at the host directory containing Caio's
      # state files; we expose it inside the container as /data/caio-state.
      CAIO_STATE_DIR: ${CAIO_STATE_DIR:-/data/caio-state}
      CAIO_BRIDGE_EVENTS_ENABLED: ${CAIO_BRIDGE_EVENTS_ENABLED:-true}
      CAIO_BRIDGE_CRITIQUES_ENABLED: ${CAIO_BRIDGE_CRITIQUES_ENABLED:-true}
      # WhatsApp pipeline V3 Postgres bridge (cockpit_ro SELECT-only role).
      # Reaches the Evolution Postgres via host.docker.internal:5433.
      WEBHOOK_DATABASE_URL: ${WEBHOOK_DATABASE_URL:-}
      CAIO_BRIDGE_WA_ENABLED: ${CAIO_BRIDGE_WA_ENABLED:-true}
    volumes:
      # Read-only bind: Caio's append-only event log and reflexion critiques.
      # Empty default uses /dev/null so the bridge cleanly reports "error" when
      # CAIO_STATE_HOST_DIR isn't configured (avoids a hard fail at startup).
      - ${CAIO_STATE_HOST_DIR:-/dev/null}:/data/caio-state:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Bind to loopback only so the backend port isn't reachable from the LAN.
      # cloudflared (CF Tunnel) runs on the same host and reaches it via 127.0.0.1.
      # In cf_access mode this is defense-in-depth against direct-origin bypass.
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    # Optional, user-managed env file.
    # IMPORTANT: do NOT load `.env.example` here because it contains non-empty
    # placeholder Clerk keys, which can accidentally flip Clerk "on".
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    develop:
      watch:
        # Rebuild frontend image when UI source or build config changes.
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/next.config.ts
        - action: rebuild
          path: ./frontend/postcss.config.js
        - action: rebuild
          path: ./frontend/tailwind.config.cjs
        - action: rebuild
          path: ./frontend/tsconfig.json

  webhook-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "scripts/rq-docker", "worker"]
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_DISPATCH_THROTTLE_SECONDS: ${RQ_DISPATCH_THROTTLE_SECONDS:-2.0}
      RQ_DISPATCH_MAX_RETRIES: ${RQ_DISPATCH_MAX_RETRIES:-3}
    restart: unless-stopped

volumes:
  postgres_data:
